<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}AIliteracy{% endblock title %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#66ffcc",
                        "background-light": "#f5f8f7",
                        "background-dark": "#0f231c",
                        "deep-blue": "#0a2540",
                        "accent-dark": "#101816"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
        }

        [x-cloak] {
            display: none !important;
        }

        .nigerian-pattern {
            background-color: transparent;
            background-image: radial-gradient(#66ffcc 0.5px, transparent 0.5px), radial-gradient(#66ffcc 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.12;
        }

        .auth-form input[type="email"],
        .auth-form input[type="password"],
        .auth-form input[type="text"] {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            padding: 0.625rem 0.875rem;
            background: #ffffff;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #66ffcc;
            box-shadow: 0 0 0 2px rgba(102, 255, 204, 0.25);
        }

        .auth-form p {
            margin-bottom: 0.85rem;
        }

        .auth-form p label {
            display: block;
            margin-bottom: 0.35rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: #334155;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col bg-background-light text-slate-900 font-display">
    {% include "includes/nav.html" %}

    <main class="flex-1">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
            {% if messages %}
                <div class="space-y-3 mb-6">
                    {% for message in messages %}
                        <div class="rounded-xl border border-primary/30 bg-white px-4 py-3 text-sm text-slate-700 shadow-sm">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        </div>
        {% block content %}{% endblock content %}
    </main>

    {% include "includes/footer.html" %}
</body>
</html>
