{% if show_quiz_prompt and active_quiz %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
    <div class="rounded-2xl border border-primary/50 bg-white p-4 sm:p-5 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
        <div>
            <p class="text-xs uppercase font-black tracking-widest text-emerald-700">8-minute challenge</p>
            <h3 class="text-lg font-black text-deep-blue">Take the Difficult AI Literacy Quiz</h3>
            <p class="text-sm text-slate-600">10 questions, strict multi-selects, shuffled order. Score 10/10 if you truly sabi.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <form method="post" action="{% url 'quiz:start' %}">
                {% csrf_token %}
                <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-primary px-4 py-2 text-sm font-black text-accent-dark hover:brightness-110 transition-all">
                    Take Quiz
                    <span class="material-symbols-outlined text-base">arrow_forward</span>
                </button>
            </form>
            <form method="post" action="{% url 'quiz:skip_prompt' %}">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.path }}" />
                <button type="submit" class="inline-flex rounded-lg border border-slate-200 px-4 py-2 text-sm font-bold text-slate-600 hover:border-slate-300">Skip for now</button>
            </form>
        </div>
    </div>
</div>
{% endif %}
