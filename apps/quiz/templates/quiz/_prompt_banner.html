{% if show_quiz_prompt and active_quiz %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
    <div class="relative overflow-hidden rounded-[2rem] bg-deep-blue px-5 py-6 shadow-[0_24px_48px_-24px_rgba(10,37,64,0.34)] sm:px-8 sm:py-8">
        <div class="pointer-events-none absolute -top-16 -right-12 h-44 w-44 rounded-full bg-primary/15 blur-3xl"></div>
        <div class="pointer-events-none absolute -bottom-20 -left-12 h-48 w-48 rounded-full bg-white/10 blur-3xl"></div>

        <div class="relative flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
            <div class="max-w-2xl">
                <span class="inline-flex items-center rounded-full bg-white/10 px-4 py-2 text-[11px] font-black uppercase tracking-[0.22em] text-primary">
                    AI literacy check
                </span>
                <h3 class="mt-4 text-2xl sm:text-4xl font-black leading-tight text-white">Are you AI literate?</h3>
                <p class="mt-3 max-w-xl text-sm sm:text-lg leading-relaxed text-slate-200">
                    Take this 10-question assessment to test your real AI fluency. No timer, instant result, and a clear next step afterward.
                </p>
            </div>
            <div class="shrink-0">
                <form method="post" action="{% url 'quiz:start' %}">
                    {% csrf_token %}
                    <button type="submit" class="inline-flex items-center gap-2 rounded-[1.2rem] bg-primary px-6 py-4 text-base font-black text-accent-dark shadow-[0_18px_30px_-16px_rgba(0,108,81,0.35)] transition-all duration-200 hover:-translate-y-0.5 hover:brightness-110">
                        Start Assessment
                        <span class="material-symbols-outlined text-base">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endif %}
