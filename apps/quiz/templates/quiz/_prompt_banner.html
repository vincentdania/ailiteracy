{% if show_quiz_prompt and active_quiz %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6">
    <div class="rounded-2xl border border-primary/40 bg-gradient-to-r from-white via-white to-primary/10 p-4 sm:p-6 shadow-sm flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <p class="text-xs uppercase font-black tracking-widest text-emerald-700">8-minute challenge</p>
            <h3 class="text-lg sm:text-xl font-black text-deep-blue">Are you AI literate?</h3>
            <p class="text-sm sm:text-base text-slate-600">Take this 8-minute quiz to test your level of AI fluency.</p>
        </div>
        <div class="flex flex-wrap items-center gap-2 sm:justify-end">
            <form method="post" action="{% url 'quiz:start' %}">
                {% csrf_token %}
                <button type="submit" class="inline-flex items-center gap-2 rounded-lg bg-primary px-5 py-2.5 text-sm font-black text-accent-dark hover:brightness-110 transition-all">
                    Start Quiz
                    <span class="material-symbols-outlined text-base">arrow_forward</span>
                </button>
            </form>
        </div>
    </div>
</div>
{% endif %}
