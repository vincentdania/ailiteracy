{% extends "base.html" %}

{% block title %}Change Subscription Plan | AILiteracy.ng{% endblock title %}

{% block content %}
<section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <h1 class="text-4xl font-black text-deep-blue">Change Subscription Plan</h1>
    <p class="text-slate-600 mt-2">Current plan: <span class="font-black">{{ current_plan }}</span></p>

    <form method="post" class="mt-8 grid gap-4 md:grid-cols-3">
        {% csrf_token %}
        {% for plan in available_plans %}
            <label class="rounded-2xl bg-white border border-slate-200 p-6 shadow-sm cursor-pointer hover:border-primary transition-colors">
                <input type="radio" name="plan" value="{{ plan.code }}" class="mb-3" {% if forloop.first %}checked{% endif %}>
                <p class="text-xl font-black text-slate-900">{{ plan.name }}</p>
                <p class="text-sm text-slate-600 mt-2">{{ plan.price }}</p>
            </label>
        {% endfor %}
        <div class="md:col-span-3">
            <button class="rounded-xl bg-primary px-6 py-3 text-sm font-black text-accent-dark">Confirm plan change</button>
        </div>
    </form>
</section>
{% endblock content %}
