{% extends "base.html" %}

{% block title %}Plan Upgrade Success | AILiteracy.ng{% endblock title %}

{% block content %}
<section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="rounded-2xl bg-white border border-slate-200 p-10 text-center shadow-sm">
        <div class="mx-auto size-20 rounded-full bg-primary/20 text-emerald-700 flex items-center justify-center">
            <span class="material-symbols-outlined text-5xl">workspace_premium</span>
        </div>
        <h1 class="mt-6 text-4xl font-black text-deep-blue">Plan Updated Successfully</h1>
        <p class="mt-3 text-slate-600">Your subscription is now on <strong>{{ current_plan }}</strong>.</p>

        <div class="mt-8 flex justify-center gap-3">
            <a href="{% url 'core:subscription_billing' %}" class="rounded-xl border border-slate-200 px-6 py-3 text-sm font-black">Back to billing</a>
            <a href="{% url 'core:premium_dashboard' %}" class="rounded-xl bg-primary px-6 py-3 text-sm font-black text-accent-dark">Go to premium dashboard</a>
        </div>
    </div>
</section>
{% endblock content %}
